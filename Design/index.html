<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Interiors · futuristic login</title>
  <!-- Font & Icons (clean, modern) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="nebula-container">
    <!-- animated silver / sky blue gradient background with moving particles (js) -->
    <canvas id="particleCanvas"></canvas>

    <!-- floating glass-card login form -->
    <div class="login-card">
      <!-- futuristic badge -->
      <div class="badge">
        <span class="badge-dot"></span>
        <span>NEBULA INTERIORS · 2026</span>
      </div>

      <!-- logotype / brand -->
      <div class="brand">
        <i class="fas fa-couch brand-icon"></i>
        <h1>Design <span>Compiler</span></h1>
      </div>

      <!-- welcome message with typing effect (js) -->
      <p class="dynamic-welcome" id="typingMessage"></p>

      <!-- login form -->
      <form id="loginForm" action="#" method="post">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" placeholder=" " required>
          <label for="email">Email address</label>
          <span class="input-highlight"></span>
        </div>

        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder=" " required>
          <label for="password">Password</label>
          <span class="input-highlight"></span>
          <button type="button" class="password-toggle" id="togglePassword">
            <i class="far fa-eye"></i>
          </button>
        </div>

        <!-- options row -->
        <div class="options">
          <label class="checkbox futuristic-check">
            <input type="checkbox" checked> <span>remember</span>
          </label>
          <a href="#" class="forgot-link">biometric? →</a>
        </div>

        <!-- futuristic login button with hover effect -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span>enter atmosphere</span>
          <i class="fas fa-arrow-right"></i>
          <div class="btn-glow"></div>
        </button>

        <!-- signup link with micro interaction -->
        <div class="signup-text">
          no account? <a href="#" id="futuristicSignup">ignite project <i class="fas fa-sparkles"></i></a>
        </div>
      </form>

      <!-- animated holographic line -->
      <div class="holographic-line"></div>
    </div>

    <!-- futuristic corner ornaments (css only) -->
    <div class="corner top-left"></div>
    <div class="corner bottom-right"></div>
  </div>

  <!-- Auth logic (must load before inline script) -->
  <script src="js/notifier.js"></script>
  <script src="js/auth.js"></script>
  <script src="utils/api-client.js"></script>

  <!-- separate JavaScript -->
  <script>
    (function () {
      "use strict";

      // ── Check if served from web server ──
      if (window.location.protocol === 'file:') {
        notify.error("You're opening this file directly. Please use http://localhost instead to access the PHP APIs.");
      }

      // ── Redirect if already authenticated ──
      if (typeof authGetUser === 'function' && authGetUser()) {
        window.location.href = 'editor.html';
      }

      // ---------- 1. canvas particles (sky blue / silver micro dots) ----------
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function initParticles() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const particleCount = Math.min(120, Math.floor(width * height / 9000));
        particles = [];
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.8,
            speedX: (Math.random() - 0.5) * 0.4,
            speedY: (Math.random() - 0.5) * 0.2,
            color: `rgba(192, 192, 192, ${Math.random() * 0.5 + 0.2})` // silver with opacity
          });
        }
      }

      function drawParticles() {
        ctx.clearRect(0, 0, width, height);

        // subtle sky blue gradient background (very light, interactive behind)
        const gradient = ctx.createLinearGradient(0, 0, width * 0.8, height);
        gradient.addColorStop(0, '#001d30');   // deep blue-black (contrast for silver)
        gradient.addColorStop(0.5, '#0f3b4f');
        gradient.addColorStop(1, '#01131e');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        // draw extra soft sky blue glow particles
        for (let p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius * 1.8, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(79, 195, 247, 0.15)'; // sky blue aura
          ctx.fill();

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius * 0.9, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }
        requestAnimationFrame(drawParticles);
      }

      function updateParticles() {
        for (let p of particles) {
          p.x += p.speedX;
          p.y += p.speedY;

          // wrap around edges
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        }
        setTimeout(updateParticles, 30);
      }

      window.addEventListener('resize', () => {
        initParticles();
      });

      initParticles();
      drawParticles();
      updateParticles();

      // ---------- 2. typing effect (modern dynamic welcome) ----------
      const messages = [
        "design your future space",
        "materials · light · AI",
        "welcome back, creator",
        "silver & sky await"
      ];
      let msgIndex = 0;
      let charIndex = 0;
      const typingElement = document.getElementById('typingMessage');

      function typeNext() {
        if (!typingElement) return;
        const currentMsg = messages[msgIndex];
        if (charIndex < currentMsg.length) {
          typingElement.textContent += currentMsg.charAt(charIndex);
          charIndex++;
          setTimeout(typeNext, 70);
        } else {
          // pause, then erase after 2s
          setTimeout(erase, 2000);
        }
      }

      function erase() {
        const currentMsg = messages[msgIndex];
        if (charIndex > 0) {
          typingElement.textContent = currentMsg.substring(0, charIndex - 1);
          charIndex--;
          setTimeout(erase, 40);
        } else {
          // move to next message
          msgIndex = (msgIndex + 1) % messages.length;
          charIndex = 0;
          setTimeout(typeNext, 300);
        }
      }

      // start typing loop after page load
      window.addEventListener('load', () => {
        if (typingElement) {
          typingElement.textContent = '';
          setTimeout(() => typeNext(), 600);
        }
      });

      // ---------- 3. password visibility toggle (interaction) ----------
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          togglePassword.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
        });
      }

      // ---------- 4. login submit — wired to API ----------
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');

      // Error notifications are handled by the global notifier system

      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('email')?.value.trim();
          const pass = document.getElementById('password')?.value;

          // Animate button while processing
          if (loginBtn) {
            loginBtn.querySelector('span').textContent = 'authenticating…';
            loginBtn.disabled = true;
          }

          try {
            const data = await ApiClient.login(email, pass);
            if (data.success) {
              // ✅ Success — fly to editor
              if (loginBtn) loginBtn.querySelector('span').textContent = '⚡ launching…';

              // Update session storage for compatibility with auth.js
              sessionStorage.setItem('wala_session', JSON.stringify(data.user));

              setTimeout(() => { window.location.href = 'editor.html'; }, 500);
            } else {
              throw new Error(data.error || 'Invalid credentials');
            }
          } catch (error) {
            // ❌ Failed — show notification
            notify.error(error.message || 'Login failed. Please try again.');
            if (loginBtn) {
              loginBtn.querySelector('span').textContent = 'enter atmosphere';
              loginBtn.disabled = false;
            }
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
          }
        });
      }

      // ... keep other event listeners (hover etc) ...
      // Update signup link behavior
      const signupLink = document.getElementById('futuristicSignup');
      if (signupLink) {
        signupLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = 'signup.html';
        });
      }

      // micro interaction: forgot link hover smooth
      const forgotLink = document.querySelector('.forgot-link');
      if (forgotLink) {
        forgotLink.addEventListener('mouseenter', () => {
          forgotLink.style.transform = 'translateX(4px)';
        });
        forgotLink.addEventListener('mouseleave', () => {
          forgotLink.style.transform = 'translateX(0)';
        });
      }

    })();
  </script>

  <style>
    /* -------------------- CSS reset & base -------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      overflow: hidden;
      background-color: #0a0f16;
      /* fallback deep */
    }

    .nebula-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 40%, #0a2535, #020a12);
    }

    /* ---------- canvas (particle background) ---------- */
    #particleCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      /* allow click through to form */
      z-index: 1;
    }

    /* ---------- main glass card ---------- */
    .login-card {
      position: relative;
      z-index: 20;
      width: 460px;
      max-width: 90%;
      background: rgba(20, 30, 40, 0.4);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 48px 24px 48px 24px;
      border: 1px solid rgba(192, 192, 192, 0.2);
      box-shadow: 0 35px 75px rgba(0, 10, 20, 0.8), 0 0 0 1px rgba(79, 195, 247, 0.2) inset, 0 0 30px rgba(79, 195, 247, 0.3);
      padding: 40px 38px;
      transition: box-shadow 0.4s, border-color 0.3s;
      animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card:hover {
      border-color: rgba(79, 195, 247, 0.6);
      box-shadow: 0 40px 90px rgba(0, 30, 50, 0.9), 0 0 0 2px rgba(192, 192, 192, 0.3) inset, 0 0 50px #4fc3f7;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* futuristic badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79, 195, 247, 0.12);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 60px;
      padding: 6px 14px 6px 8px;
      margin-bottom: 28px;
      color: #c0c0c0;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      backdrop-filter: blur(5px);
      width: fit-content;
    }

    .badge-dot {
      width: 10px;
      height: 10px;
      background: #4fc3f7;
      border-radius: 50%;
      box-shadow: 0 0 12px #4fc3f7;
      animation: pulseDot 2s infinite;
    }

    @keyframes pulseDot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.2);
        background: #c0c0c0;
      }
    }

    /* brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand-icon {
      font-size: 2.6rem;
      color: #c0c0c0;
      filter: drop-shadow(0 0 8px #4fc3f7);
      transition: transform 0.3s ease;
    }

    .brand:hover .brand-icon {
      transform: rotate(-5deg) scale(1.05);
      color: #4fc3f7;
    }

    .brand h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #f0f0f0, #c0c0c0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px rgba(79, 195, 247, 0.6);
    }

    .brand h1 span {
      font-weight: 700;
      color: #4fc3f7;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      text-shadow: 0 0 20px #4fc3f7;
    }

    /* dynamic welcome text */
    .dynamic-welcome {
      min-height: 36px;
      font-size: 1.2rem;
      font-weight: 300;
      color: #c0c0c0;
      margin: 0 0 30px 0;
      border-left: 3px solid #4fc3f7;
      padding-left: 16px;
      background: linear-gradient(90deg, rgba(79, 195, 247, 0.1), transparent);
      border-radius: 0 4px 4px 0;
      display: flex;
      align-items: center;
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.2);
    }

    /* input groups */
    .input-group {
      position: relative;
      margin-bottom: 32px;
      width: 100%;
    }

    .input-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1.5px solid rgba(192, 192, 192, 0.3);
      border-radius: 18px;
      padding: 18px 20px 18px 52px;
      font-size: 1rem;
      color: #e0e0e0;
      outline: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .input-group label {
      position: absolute;
      left: 52px;
      top: 18px;
      color: #a0b0b8;
      font-size: 1rem;
      font-weight: 300;
      pointer-events: none;
      transition: 0.2s ease-out;
      background: transparent;
      padding: 0 4px;
    }

    .input-group input:focus~label,
    .input-group input:not(:placeholder-shown)~label {
      top: -10px;
      left: 42px;
      font-size: 0.75rem;
      background: rgba(20, 30, 45, 0.9);
      backdrop-filter: blur(4px);
      padding: 0 8px;
      color: #4fc3f7;
      border-radius: 10px;
      border: 1px solid #4fc3f7;
      letter-spacing: 0.5px;
    }

    .input-group input:focus {
      border-color: #4fc3f7;
      box-shadow: 0 0 25px #4fc3f7, 0 0 5px #c0c0c0 inset;
    }

    .input-icon {
      position: absolute;
      left: 20px;
      top: 20px;
      color: #c0c0c0;
      font-size: 1.2rem;
      z-index: 3;
      text-shadow: 0 0 8px #4fc3f7;
      transition: color 0.2s;
    }

    .input-group input:focus~.input-icon {
      color: #4fc3f7;
    }

    .input-highlight {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #c0c0c0, #4fc3f7, #c0c0c0);
      transition: width 0.3s ease;
      border-radius: 2px;
      opacity: 0.5;
    }

    .input-group input:focus~.input-highlight {
      width: 100%;
    }

    /* password toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 16px;
      background: transparent;
      border: none;
      color: #c0c0c0;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 5;
      transition: color 0.2s, transform 0.2s;
    }

    .password-toggle:hover {
      color: #4fc3f7;
      transform: scale(1.15);
    }

    /* options row */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0 28px;
      color: #c0c0c0;
    }

    .futuristic-check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .futuristic-check:hover {
      color: #4fc3f7;
    }

    .futuristic-check input {
      accent-color: #4fc3f7;
      width: 18px;
      height: 18px;
      box-shadow: 0 0 12px #4fc3f7;
    }

    .forgot-link {
      color: #c0c0c0;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
      font-weight: 400;
    }

    .forgot-link:hover {
      color: #4fc3f7;
      border-bottom-color: #4fc3f7;
      transform: translateX(3px);
      text-shadow: 0 0 8px;
    }

    /* login button */
    .login-btn {
      position: relative;
      width: 100%;
      padding: 18px 20px;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #c0c0c0;
      border-radius: 50px;
      color: #c0c0c0;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 15px rgba(79, 195, 247, 0);
      z-index: 2;
      margin-bottom: 22px;
    }

    .login-btn span {
      z-index: 4;
    }

    .login-btn i {
      font-size: 1.2rem;
      transition: transform 0.3s;
      z-index: 4;
    }

    .btn-glow {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.5), rgba(192, 192, 192, 0.6), transparent);
      transition: left 0.6s;
      z-index: 1;
    }

    .login-btn:hover {
      border-color: #4fc3f7;
      color: #0f1a24;
      background: #c0c0c0;
      box-shadow: 0 0 40px #4fc3f7, 0 0 10px silver;
      transform: scale(1.03);
    }

    .login-btn:hover i {
      transform: translateX(10px) rotate(5deg);
      color: #01070c;
    }

    .login-btn:hover .btn-glow {
      left: 100%;
    }

    /* signup text */
    .signup-text {
      text-align: center;
      color: #a0b0b8;
      font-size: 0.95rem;
    }

    .signup-text a {
      color: #c0c0c0;
      text-decoration: none;
      font-weight: 600;
      margin-left: 8px;
      border-bottom: 1px dashed #4fc3f7;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .signup-text a:hover {
      color: #4fc3f7;
      border-bottom-style: solid;
      text-shadow: 0 0 10px;
      gap: 12px;
    }

    /* holographic line */
    .holographic-line {
      margin-top: 28px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c0c0c0, #4fc3f7, #c0c0c0, transparent);
      background-size: 400% 100%;
      animation: hologlow 6s infinite linear;
      border-radius: 2px;
      opacity: 0.7;
    }

    @keyframes hologlow {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 0%;
      }
    }

    /* corner ornaments */
    .corner {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(79, 195, 247, 0.3);
      filter: drop-shadow(0 0 15px #4fc3f7);
      z-index: 10;
      pointer-events: none;
    }

    .top-left {
      top: 20px;
      left: 20px;
      border-right: none;
      border-bottom: none;
      border-radius: 40px 0 0 0;
    }

    .bottom-right {
      bottom: 20px;
      right: 20px;
      border-left: none;
      border-top: none;
      border-radius: 0 0 40px 0;
    }
  </style>
</body>

</html>
